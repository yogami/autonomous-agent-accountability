            if(input.value) {
                const idx = input.value.indexOf('"signature": "');
                if(idx !== -1) {
                    const charPos = idx + 14;
                    const c = input.value.charAt(charPos);
                    const newChar = c === '0' ? '1' : '0';
                    input.value = input.value.substring(0, charPos) + newChar + input.value.substring(charPos+1);
                    document.getElementById('results').innerHTML = '<div class="error">Data silently tampered (signature byte flipped). Click Verify to detect it!</div>';
                } else {
                    input.value = input.value.replace(/a/g, 'b');
                    document.getElementById('results').innerHTML = '<div class="error">Data blindly tampered. Click Verify to detect it!</div>';
                }
            }
        });
    </script>
</body>
